{% extends 'legal/base_legal.html' %}
{% load static %}

{% block page_actions %}
<div class="action-buttons">
    <a href="{% url 'legal:trademarks' %}" class="btn btn-secondary btn-sm">
        <span class="btn-icon">←</span> Back to Trademarks
    </a>
</div>
{% endblock %}

{% block legal_content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        animation: fadeInUp 0.4s ease;
    }

    .form-card {
        background: linear-gradient(145deg, rgba(167, 139, 250, 0.04), rgba(167, 139, 250, 0.01));
        border: 1px solid rgba(167, 139, 250, 0.06);
        border-radius: 16px;
        padding: 28px;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
    }

    .form-card:hover {
        border-color: rgba(167, 139, 250, 0.12);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
    }

    /* ===== BUTTON STYLES ===== */
    .action-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.85rem;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid transparent;
        cursor: pointer;
        white-space: nowrap;
        position: relative;
        overflow: hidden;
    }

    .btn .btn-icon {
        font-size: 1.1rem;
        transition: transform 0.3s ease;
        line-height: 1;
    }

    .btn:hover .btn-icon {
        transform: scale(1.2) rotate(-5deg);
    }

    /* ===== RIPPLE EFFECT ===== */
    .btn::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn:active::after {
        width: 300px;
        height: 300px;
    }

    /* ===== PRIMARY BUTTON ===== */
    .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
        color: #ffffff;
        border-color: rgba(124, 58, 237, 0.3);
        box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2);
    }

    .btn-primary::after {
        background: rgba(255, 255, 255, 0.15);
    }

    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        border-color: rgba(124, 58, 237, 0.4);
        color: #ffffff;
    }

    .btn-primary:active {
        transform: translateY(0px);
        box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2);
    }

    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
    }

    /* ===== SECONDARY BUTTON ===== */
    .btn-secondary {
        background: rgba(167, 139, 250, 0.06);
        color: #94a3b8;
        border-color: rgba(167, 139, 250, 0.08);
    }

    .btn-secondary::after {
        background: rgba(167, 139, 250, 0.15);
    }

    .btn-secondary:hover {
        background: rgba(167, 139, 250, 0.12);
        color: #e8edf5;
        border-color: rgba(167, 139, 250, 0.15);
        transform: translateY(-3px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .btn-secondary:active {
        transform: translateY(0px);
    }

    .btn-secondary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
    }

    /* ===== BUTTON SIZES ===== */
    .btn-sm {
        padding: 6px 16px;
        font-size: 0.75rem;
        border-radius: 8px;
    }

    .btn-sm .btn-icon {
        font-size: 0.9rem;
    }

    .btn-lg {
        padding: 10px 28px;
        font-size: 1rem;
        border-radius: 12px;
    }

    .btn-lg .btn-icon {
        font-size: 1.2rem;
    }

    /* ===== FORM STYLES ===== */
    .form-group {
        margin-bottom: 22px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #d6e0f0;
        font-size: 0.85rem;
        margin-bottom: 6px;
        letter-spacing: 0.3px;
    }

    .form-group label.required::after {
        content: '*';
        color: #ef4444;
        margin-left: 4px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid rgba(167, 139, 250, 0.1);
        border-radius: 12px;
        background: rgba(167, 139, 250, 0.03);
        color: #e8edf5;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-sizing: border-box;
    }

    .form-group input:hover,
    .form-group textarea:hover {
        border-color: rgba(167, 139, 250, 0.25);
        background: rgba(167, 139, 250, 0.06);
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #7c3aed;
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        background: rgba(167, 139, 250, 0.05);
    }

    .form-group input::placeholder {
        color: #64748b;
        font-weight: 400;
    }

    /* ===== DROPDOWN (SELECT) ENHANCED STYLES ===== */
    .form-group .custom-select-wrapper {
        position: relative;
        width: 100%;
    }

    .form-group .custom-select-wrapper select {
        width: 100%;
        padding: 12px 16px;
        padding-right: 44px;
        border: 2px solid rgba(167, 139, 250, 0.1);
        border-radius: 12px;
        background: rgba(167, 139, 250, 0.03);
        color: #e8edf5;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-sizing: border-box;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        cursor: pointer;
        position: relative;
        z-index: 1;
    }

    .form-group .custom-select-wrapper select:hover {
        border-color: rgba(167, 139, 250, 0.25);
        background: rgba(167, 139, 250, 0.06);
    }

    .form-group .custom-select-wrapper select:focus {
        outline: none;
        border-color: #7c3aed;
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        background: rgba(167, 139, 250, 0.05);
    }

    /* Custom Arrow */
    .form-group .custom-select-wrapper::after {
        content: '▼';
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 0.7rem;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 2;
    }

    .form-group .custom-select-wrapper:hover::after {
        color: #a78bfa;
    }

    .form-group .custom-select-wrapper:focus-within::after {
        color: #a78bfa;
        transform: translateY(-50%) rotate(180deg);
    }

    /* Dropdown Options Styling */
    .form-group .custom-select-wrapper select option {
        background: #1a1035;
        color: #e8edf5;
        padding: 12px 16px;
        font-size: 0.95rem;
        border: none;
        border-bottom: 1px solid rgba(167, 139, 250, 0.05);
        transition: all 0.2s;
    }

    .form-group .custom-select-wrapper select option:hover {
        background: rgba(124, 58, 237, 0.15);
        color: #a78bfa;
    }

    .form-group .custom-select-wrapper select option:checked {
        background: rgba(124, 58, 237, 0.2);
        color: #a78bfa;
        font-weight: 600;
    }

    .form-group .custom-select-wrapper select option:disabled {
        color: #64748b;
        font-style: italic;
    }

    .form-group .custom-select-wrapper select option[value=""] {
        color: #64748b;
    }

    /* Custom Scrollbar for Dropdown */
    .form-group .custom-select-wrapper select::-webkit-scrollbar {
        width: 6px;
        border-radius: 10px;
    }

    .form-group .custom-select-wrapper select::-webkit-scrollbar-track {
        background: rgba(167, 139, 250, 0.03);
        border-radius: 10px;
    }

    .form-group .custom-select-wrapper select::-webkit-scrollbar-thumb {
        background: rgba(167, 139, 250, 0.25);
        border-radius: 10px;
    }

    .form-group .custom-select-wrapper select::-webkit-scrollbar-thumb:hover {
        background: rgba(167, 139, 250, 0.4);
    }

    .form-group .help-text {
        display: block;
        color: #64748b;
        font-size: 0.78rem;
        margin-top: 6px;
        font-weight: 400;
    }

    .form-group .help-text.error {
        color: #f87171;
    }

    /* ===== VALIDATION STATES ===== */
    .form-group input.error,
    .form-group .custom-select-wrapper select.error,
    .form-group textarea.error {
        border-color: #ef4444 !important;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1) !important;
    }

    .form-group input.success,
    .form-group .custom-select-wrapper select.success,
    .form-group textarea.success {
        border-color: #34d399 !important;
        box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1) !important;
    }

    /* ===== FORM ACTIONS ===== */
    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid rgba(167, 139, 250, 0.06);
        flex-wrap: wrap;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
        .form-container {
            padding: 0 10px;
        }

        .form-card {
            padding: 20px 16px;
        }

        .action-buttons {
            flex-direction: column;
            width: 100%;
        }

        .btn {
            width: 100%;
            justify-content: center;
        }

        .form-actions {
            flex-direction: column;
        }

        .btn-primary,
        .btn-secondary {
            width: 100%;
            justify-content: center;
        }
    }

    @media (max-width: 480px) {
        .form-card {
            padding: 16px 12px;
        }

        .form-group input,
        .form-group .custom-select-wrapper select,
        .form-group textarea {
            padding: 10px 14px;
            font-size: 0.9rem;
            border-radius: 10px;
        }

        .form-group .custom-select-wrapper select {
            padding-right: 36px;
        }

        .btn {
            font-size: 0.8rem;
            padding: 6px 14px;
        }
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-group {
        animation: fadeInUp 0.4s ease forwards;
        opacity: 0;
    }

    .form-group:nth-child(1) { animation-delay: 0.05s; }
    .form-group:nth-child(2) { animation-delay: 0.1s; }
    .form-group:nth-child(3) { animation-delay: 0.15s; }

    /* ===== LOADING SPINNER ===== */
    .btn-primary .spinner,
    .btn-secondary .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    .btn-primary.loading .spinner,
    .btn-secondary.loading .spinner {
        display: inline-block;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* ===== SELECT PLACEHOLDER STYLING ===== */
    .form-group .custom-select-wrapper select:invalid {
        color: #64748b;
    }

    .form-group .custom-select-wrapper select option:first-child {
        color: #64748b;
    }
</style>

<div class="form-container">
    <div class="form-card">
        <form method="POST" id="trademarkForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="trademark_name" class="required">Trademark Name</label>
                <input type="text" id="trademark_name" name="trademark_name" value="{{ trademark.trademark_name|default:'' }}" placeholder="e.g., MyBrand™" required>
                <span class="help-text">Enter the trademark name</span>
            </div>

            <div class="form-group">
                <label for="status" class="required">Status</label>
                <div class="custom-select-wrapper">
                    <select id="status" name="status" required>
                        <option value="">Select Status</option>
                        <option value="Applied" {% if trademark.status == 'Applied' %}selected{% endif %}>⏳ Applied</option>
                        <option value="Objection" {% if trademark.status == 'Objection' %}selected{% endif %}>⚠️ Objection</option>
                        <option value="Registered" {% if trademark.status == 'Registered' %}selected{% endif %}>✅ Registered</option>
                    </select>
                </div>
                <span class="help-text">Select the current status of the trademark</span>
            </div>

            <div class="form-group">
                <label for="application_number" class="required">Application Number</label>
                <input type="text" id="application_number" name="application_number" value="{{ trademark.application_number|default:'' }}" placeholder="e.g., TM-2024-001" required>
                <span class="help-text">Enter the trademark application number</span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-icon">{% if is_edit %}💾{% else %}✅{% endif %}</span>
                    <span class="btn-text">{% if is_edit %}Update Trademark{% else %}Save Trademark{% endif %}</span>
                    <span class="btn-shortcut">Ctrl+S</span>
                </button>
                <a href="{% url 'legal:trademarks' %}" class="btn btn-secondary">
                    <span class="btn-icon">✕</span>
                    <span class="btn-text">Cancel</span>
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('trademarkForm');
        const submitBtn = document.getElementById('submitBtn');

        // Auto-focus first input
        const firstInput = form.querySelector('input:not([type="hidden"]), select, textarea');
        if (firstInput) {
            firstInput.focus();
        }

        // Real-time validation feedback
        form.querySelectorAll('input, select, textarea').forEach(function(field) {
            field.addEventListener('blur', function() {
                if (this.value.trim() === '' && this.hasAttribute('required')) {
                    this.classList.add('error');
                    this.classList.remove('success');
                } else if (this.value.trim() !== '') {
                    this.classList.remove('error');
                    this.classList.add('success');
                }
            });

            field.addEventListener('focus', function() {
                this.classList.remove('error');
            });

            field.addEventListener('input', function() {
                if (this.value.trim() !== '') {
                    this.classList.remove('error');
                    this.classList.add('success');
                } else {
                    this.classList.remove('success');
                }
            });
        });

        // Prevent double submission
        form.addEventListener('submit', function(e) {
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = `
                <span class="spinner"></span>
                <span class="btn-text">{% if is_edit %}Updating...{% else %}Saving...{% endif %}</span>
            `;
        });

        // Keyboard shortcut: Ctrl+S to submit
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (form) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });

        console.log('📝 Trademark Form loaded');
        console.log('🔧 Mode: {% if is_edit %}Edit{% else %}Create{% endif %}');
    });
</script>
{% endblock %}
