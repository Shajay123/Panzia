{% extends 'base.html' %}
{% load static %}

{% block title %}
Login - PANZIA
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="auth-container">

        <h2>Welcome Back</h2>

        <p class="auth-subtitle">
            Build. Execute. Deploy.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control-custom"
                    placeholder="Enter your username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control-custom"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="primary-btn auth-btn">
                Login
            </button>

        </form>

        <div class="auth-footer">
            <p>
                Don't have an account?
                <a href="{% url 'register' %}">
                    Register Now
                </a>
            </p>
        </div>

    </div>

</section>

{% endblock %}
