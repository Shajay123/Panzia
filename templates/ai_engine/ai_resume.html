{% extends 'base.html' %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/ai_engine.css' %}">

<div class="resume-page">


<div class="resume-hero">

    <div class="hero-glow"></div>

    <div class="resume-header">

        <div class="resume-icon">
            🤖
        </div>

        <div>

            <h1 class="resume-title">
                AI Resume Builder
            </h1>

            <p class="resume-subtitle">
                Professionally Generated Resume powered by PANZIA AI
            </p>

        </div>

    </div>

</div>


<div class="resume-actions">

    <a href="{% url 'download_resume' %}" class="btn-download">
        📄 Download PDF
    </a>

    <a href="{% url 'career_roadmap' %}" class="btn-roadmap">
        🚀 Career Roadmap
    </a>

</div>


<div class="resume-card">

    <div class="card-header">

        <h3>
            AI Generated Resume
        </h3>

        <span class="ai-badge">
            AI Powered
        </span>

    </div>

    <div class="resume-content">

        <pre>{{ resume }}</pre>

    </div>

</div>


</div>



{% endblock %}
