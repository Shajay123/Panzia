{% extends 'finance/base_finance.html' %}
{% load static %}

{% block page_actions %}
<a href="{% url 'finance:vendor_list' %}" class="btn-secondary">← Back to Vendors</a>
{% endblock %}

{% block finance_content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
    }

    .form-card {
        background: rgba(167, 139, 250, 0.03);
        border: 1px solid rgba(167, 139, 250, 0.06);
        border-radius: 12px;
        padding: 24px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 500;
        color: #d6e0f0;
        font-size: 0.85rem;
        margin-bottom: 4px;
    }

    .form-group label.required::after {
        content: '*';
        color: #ef4444;
        margin-left: 4px;
    }

    .form-group input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid rgba(167, 139, 250, 0.1);
        border-radius: 8px;
        background: rgba(167, 139, 250, 0.03);
        color: #e8edf5;
        font-size: 0.95rem;
        transition: all 0.3s;
        box-sizing: border-box;
    }

    .form-group input:focus {
        outline: none;
        border-color: #7c3aed;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .form-group .help-text {
        display: block;
        color: #64748b;
        font-size: 0.78rem;
        margin-top: 4px;
    }

    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid rgba(167, 139, 250, 0.06);
    }

    .btn-submit {
        padding: 10px 24px;
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
    }

    .btn-cancel {
        padding: 10px 24px;
        background: rgba(167, 139, 250, 0.06);
        color: #94a3b8;
        border: 1px solid rgba(167, 139, 250, 0.08);
        border-radius: 8px;
        font-weight: 500;
        font-size: 0.95rem;
        text-decoration: none;
        transition: all 0.3s;
    }

    .btn-cancel:hover {
        background: rgba(167, 139, 250, 0.12);
        color: #e8edf5;
    }
</style>

<div class="form-container">
    <div class="form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="vendor_name" class="required">Vendor Name</label>
                <input type="text" id="vendor_name" name="vendor_name" value="{{ vendor.vendor_name|default:'' }}" placeholder="e.g., ABC Supplies" required>
                <span class="help-text">Name of the vendor or supplier</span>
            </div>

            <div class="form-group">
                <label for="phone" class="required">Phone</label>
                <input type="tel" id="phone" name="phone" value="{{ vendor.phone|default:'' }}" placeholder="e.g., +91 9876543210" required>
                <span class="help-text">Contact number of the vendor</span>
            </div>

            <div class="form-group">
                <label for="email" class="required">Email</label>
                <input type="email" id="email" name="email" value="{{ vendor.email|default:'' }}" placeholder="e.g., vendor@example.com" required>
                <span class="help-text">Email address of the vendor</span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">{% if is_edit %}💾 Update Vendor{% else %}✅ Save Vendor{% endif %}</button>
                <a href="{% url 'finance:vendor_list' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
